services:
  dashboard:
    build: .
    container_name: homelab-dashboard
    ports:
      - "3001:3000"
    environment:
      - COMPOSE_PROJECT=${COMPOSE_PROJECT:-homelab}
      - ENDPOINTS=${ENDPOINTS:-[]}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
